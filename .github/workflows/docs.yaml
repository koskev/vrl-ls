jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
    - name: checkout full
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
    - name: Most important Action!
      uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7
      with:
        hatchet-protocol: rampage
    - name: Install nix
      uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - run: cd docs && nix develop ..#docs --command make build && cd ..
    - name: Upload artifacts for pages
      uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
      with:
        path: docs/book
  pages:
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    needs:
    - docs
    permissions:
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
    - id: deployment
      name: Deploy to GitHub Pages
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
'on':
  push:
    branches:
    - main
